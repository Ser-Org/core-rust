# Railway service config. See https://docs.railway.com/reference/config-as-code
#
# Builder: DOCKERFILE — Railway uses ./Dockerfile instead of Nixpacks.
# Health check: Axum serves GET /api/v1/health once the app has finished
# initializing (db migrate + object-store bucket setup + job workers).
# Initialization takes ~5-20s typically; 300s timeout absorbs cold-start
# spikes and first-migration runs.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
